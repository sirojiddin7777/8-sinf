<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>8-sinf Galereya</title>

<style>
body{
  margin:0;
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(135deg,#eef2f3,#dfe9f3);
  text-align:center;
}

/* TITLE */
h1{
  padding:40px 0;
  font-size:42px;
  font-weight:700;
  background: linear-gradient(45deg,#0072ff,#00c6ff);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

/* GRID */
.gallery-grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(320px,1fr));
  gap:30px;
  padding:40px 60px;
}

/* CARD */
.item{
  position:relative;
  overflow:hidden;
  border-radius:30px;
  cursor:pointer;
  transform:translateX(-80px);
  opacity:0;
  animation:slideRight 0.8s forwards;
  background:white;
  box-shadow:0 15px 40px rgba(0,0,0,0.1);
  transition:0.4s;
}

.item:hover{
  transform:translateX(0) scale(1.03);
  box-shadow:0 25px 60px rgba(0,0,0,0.2);
}

/* IMAGE */
.item img,
.item video{
  width:100%;
  height:300px;
  object-fit:cover;
  transition:0.5s;
}

.item:hover img,
.item:hover video{
  transform:scale(1.07);
}

/* SHINE EFFECT */
.item::before{
  content:"";
  position:absolute;
  top:0;
  left:-100%;
  width:50%;
  height:100%;
  background:linear-gradient(
    120deg,
    transparent,
    rgba(255,255,255,0.6),
    transparent
  );
  transform:skewX(-25deg);
}

.item:hover::before{
  animation:shine 1s forwards;
}

@keyframes shine{
  100%{ left:150%; }
}

/* SLIDE ANIMATION */
@keyframes slideRight{
  to{
    transform:translateX(0);
    opacity:1;
  }
}

.item:nth-child(1){ animation-delay:0.1s; }
.item:nth-child(2){ animation-delay:0.2s; }
.item:nth-child(3){ animation-delay:0.3s; }
.item:nth-child(4){ animation-delay:0.4s; }
.item:nth-child(5){ animation-delay:0.5s; }
.item:nth-child(6){ animation-delay:0.6s; }
.item:nth-child(7){ animation-delay:0.7s; }

/* LIGHTBOX */
#lightbox{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.9);
  display:none;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  z-index:1000;
}

#lightbox img,
#lightbox video{
  max-width:85%;
  max-height:85%;
  border-radius:20px;
  box-shadow:0 0 40px rgba(255,255,255,0.3);
}

.back{
  margin-top:25px;
  padding:12px 30px;
  background:linear-gradient(45deg,#ff416c,#ff4b2b);
  color:white;
  text-decoration:none;
  border-radius:50px;
  font-weight:bold;
  transition:0.4s;
}

.back:hover{
  transform:scale(1.1);
}
</style>

</head>
<body>

<h1>📸 8-sinf Galereya</h1>

<div class="gallery-grid">

<div class="item"><img src="1.png" onclick="openImage(this.src)"></div>
<div class="item"><img src="2.png" onclick="openImage(this.src)"></div>
<div class="item"><img src="3.png" onclick="openImage(this.src)"></div>
<div class="item"><img src="4.png" onclick="openImage(this.src)"></div>
<div class="item"><img src="5.png" onclick="openImage(this.src)"></div>

<div class="item"><video src="1.mp4" onclick="openVideo(this.src)"></video></div>
<div class="item"><video src="2.mp4" onclick="openVideo(this.src)"></video></div>

</div>

<!-- Lightbox -->
<div id="lightbox" onclick="closeLightbox()">
  <img id="lightbox-img">
  <video id="lightbox-video" controls></video>
  <a href="index.html" class="back">⬅ Orqaga qaytish</a>
</div>

<script>
function openImage(src){
  document.getElementById("lightbox").style.display="flex";
  document.getElementById("lightbox-img").src=src;
  document.getElementById("lightbox-img").style.display="block";
  document.getElementById("lightbox-video").style.display="none";
}

function openVideo(src){
  document.getElementById("lightbox").style.display="flex";
  document.getElementById("lightbox-video").src=src;
  document.getElementById("lightbox-video").style.display="block";
  document.getElementById("lightbox-img").style.display="none";
}

function closeLightbox(){
  document.getElementById("lightbox").style.display="none";
}
</script>
<script>
// PAROL
const secretCode = "8888"; // shu yerga o'zingiz istagan kodni yozing

// O'ng klik bloklash
document.addEventListener("contextmenu", function(e){
    e.preventDefault();
    let userCode = prompt("🔒 Yuklab olish uchun maxsus kodni kiriting:");
    if(userCode !== secretCode){
        alert("❌ Noto‘g‘ri kod!");
    } else {
        alert("✅ Ruxsat berildi");
    }
});

// Telefon uchun uzoq bosishni bloklash
document.addEventListener("touchstart", function(e){
    this.touchTimer = setTimeout(()=>{
        let userCode = prompt("🔒 Yuklab olish uchun maxsus kodni kiriting:");
        if(userCode !== secretCode){
            alert("❌ Noto‘g‘ri kod!");
        } else {
            alert("✅ Ruxsat berildi");
        }
    }, 700);
});

document.addEventListener("touchend", function(){
    clearTimeout(this.touchTimer);
});
</script>
</body>
</html>
