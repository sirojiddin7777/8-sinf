<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>8-sinf Yangiliklar</title>

<style>

/* ===== ULTRA 4K ANIMATED BACKGROUND ===== */
body{
  margin:0;
  font-family:'Segoe UI',sans-serif;
  background:linear-gradient(-45deg,#0f2027,#203a43,#2c5364,#000000);
  background-size:400% 400%;
  animation:bgMove 12s ease infinite;
  color:white;
}

@keyframes bgMove{
  0%{background-position:0% 50%;}
  50%{background-position:100% 50%;}
  100%{background-position:0% 50%;}
}

/* ===== HEADER ===== */
header{
  text-align:center;
  padding:70px 20px 30px;
}

header h1{
  font-size:50px;
  letter-spacing:2px;
  background:linear-gradient(45deg,#00f0ff,#ff00c8);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

/* ===== BIG VIDEO CARD ===== */
.video-wrapper{
  display:flex;
  justify-content:center;
  padding:60px 20px;
}

.video-card{
  position:relative;
  width:85%;
  max-width:1200px;
  border-radius:35px;
  overflow:hidden;
  background:rgba(255,255,255,0.06);
  backdrop-filter:blur(20px);
  box-shadow:0 0 40px rgba(0,255,255,0.3);
  transition:0.5s;
}

/* Glow border */
.video-card::before{
  content:"";
  position:absolute;
  inset:-3px;
  border-radius:35px;
  background:linear-gradient(45deg,#00f0ff,#ff00c8,#00ff6a,#ffcc00,#00f0ff);
  background-size:400%;
  z-index:-1;
  animation:borderGlow 6s linear infinite;
}

@keyframes borderGlow{
  0%{background-position:0%;}
  100%{background-position:400%;}
}

.video-card:hover{
  transform:scale(1.03);
  box-shadow:0 0 70px rgba(0,255,255,0.8);
}

.video-card video{
  width:100%;
  height:auto;
  display:block;
}

/* ===== BACK BUTTON ===== */
.back{
  display:inline-block;
  margin:60px auto;
  padding:15px 45px;
  background:linear-gradient(45deg,#ff416c,#ff4b2b);
  color:white;
  text-decoration:none;
  border-radius:50px;
  font-weight:bold;
  transition:0.4s;
}

.back:hover{
  transform:scale(1.1);
}

/* ===== SIGNATURE ===== */
.creator{
  text-align:center;
  margin:120px 0 50px;
  font-size:48px;
  font-family:cursive;
  font-weight:bold;
  letter-spacing:3px;
}

.creator span{
  display:inline-block;
  transition:0.4s;
  cursor:pointer;
}

.creator span:hover{
  transform:translateY(-18px) scale(1.3);
  animation:colorShift 1s infinite alternate;
}

@keyframes colorShift{
  0%{ color:#ff0080; text-shadow:0 0 10px #ff0080; }
  25%{ color:#00f0ff; text-shadow:0 0 15px #00f0ff; }
  50%{ color:#00ff6a; text-shadow:0 0 20px #00ff6a; }
  75%{ color:#ffcc00; text-shadow:0 0 20px #ffcc00; }
  100%{ color:#ff3c00; text-shadow:0 0 25px #ff3c00; }
}

</style>
</head>

<body>

<header>
  <h1>📰 8-sinf Yangiliklar</h1>
</header>

<div class="video-wrapper">
  <div class="video-card">
    <video src="uzbek.mp4.mp4" controls autoplay muted loop></video>
  </div>
</div>

<center>
  <a href="index.html" class="back">⬅ Bosh sahifaga qaytish</a>
</center>

<div class="creator">
  <span>C</span><span>R</span><span>E</span><span>A</span><span>T</span><span>E</span><span>D</span>
  <span>&nbsp;</span>
  <span>B</span><span>Y</span>
  <span>&nbsp;</span>
  <span>S</span><span>I</span><span>R</span><span>O</span><span>J</span><span>I</span><span>D</span><span>D</span><span>I</span><span>N</span>
</div>

</body>
</html>
